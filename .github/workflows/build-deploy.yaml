name: Build And Deploy Workflow

on:
  push:
    branches: [main,develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'


  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - package-lock.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'where to run'
        required: true
        default: 'staging'
        type: choice
        options: [staging,production]
env:
  NODE_VERSION: '18'


jobs:
  quality-check:
    runs-on: ubuntu-latest
    outputs:
      test-passed: ${{ steps.test.output.passed }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check code style
        run: npm run lint
      - name: Run tests
        id: test
        run: |
          npm test
          echo "passed=true" >> $GITHUB_OUTPUT
#second job: build the application
  build:
    runs-on: ubuntu-latest
    needs: queality-check
    if: needs.quality-check.outputs.test-passed == 'true'

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build the application
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application build
          path: dist/
#third job: deploy the application
  deploy:
    runs-on: ubuntu-lates
    needs: [quality-check,build]
    if: github.ref == 'refs/heads/main' || github.event_name =='workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4

      - name: downloadbuild artifacts
        uses: actions/download-artifact@v4
        with:
          name: application build
          path: dist/
      - name: deploy to enironment
        run: |
          echo "deploying to ${{ github.event.inputs.environemt || 'staging' }}"
